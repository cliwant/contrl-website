<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contrl for Windows</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="robots" content="noindex, nofollow">
    <style>
        :root {
            color-scheme: light;
            --bg: #f4efe8;
            --card: rgba(255, 255, 255, 0.74);
            --text: #2e241d;
            --muted: #72665d;
            --accent: #d84a10;
            --line: rgba(46, 36, 29, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background:
                radial-gradient(circle at top left, rgba(216, 74, 16, 0.16), transparent 28%),
                radial-gradient(circle at bottom right, rgba(46, 36, 29, 0.08), transparent 28%),
                linear-gradient(180deg, #fbf8f3 0%, var(--bg) 100%);
            color: var(--text);
            font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        main {
            width: min(100%, 720px);
            padding: 42px 34px;
            border: 1px solid var(--line);
            border-radius: 28px;
            background: var(--card);
            backdrop-filter: blur(14px);
            box-shadow: 0 28px 80px rgba(46, 36, 29, 0.12);
            text-align: center;
        }

        .eyebrow {
            margin: 0 0 14px;
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(34px, 6vw, 48px);
            line-height: 1.05;
            letter-spacing: -0.04em;
            text-wrap: balance;
            font-family: "Freesentation", "Pretendard", "Apple SD Gothic Neo", sans-serif;
        }

        p {
            margin: 18px 0 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.7;
        }

        .actions {
            display: flex;
            justify-content: center;
            margin-top: 28px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            border-radius: 999px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 14px 30px rgba(216, 74, 16, 0.22);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 34px rgba(216, 74, 16, 0.28);
        }

        @media (max-width: 640px) {
            main {
                width: min(100%, 520px);
                padding: 36px 24px;
            }
        }
    </style>
</head>
<body>
    <main>
        <p class="eyebrow">contrl downloads</p>
        <h1>Your download is starting</h1>
        <p>If it does not begin in a moment, use the button below.</p>
        <div class="actions">
            <a id="download-link" class="button" href="https://contrl.ai/downloads/windows/latest.exe">Download for Windows</a>
        </div>
    </main>

    <script>
        (function () {
            const localHosts = new Set(['localhost', '127.0.0.1', '[::1]']);
            const target = localHosts.has(window.location.hostname)
                ? 'https://contrl.ai/downloads/windows/latest.exe'
                : '/downloads/windows/latest.exe';

            const downloadLink = document.getElementById('download-link');
            downloadLink.href = target;

            window.setTimeout(function () {
                window.location.assign(target);
            }, 900);
        }());
    </script>
</body>
</html>
